<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总站导航</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background: #f7f9fc;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        nav {
            width: min(420px, 100%);
            display: grid;
            gap: 12px;
        }

        a {
            display: block;
            text-decoration: none;
            text-align: center;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #d8e0eb;
            background: #ffffff;
            color: #1f2d3d;
            font-size: 17px;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
        }

        a:active {
            transform: scale(0.99);
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }

            a {
                padding: 15px 16px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <nav aria-label="页面跳转">
        <a href="./ok/index.html">无限拟合模型</a>
        <a href="./ok2/index.html">固定止损策略</a>
        <a href="./eth/index.html">15分钟大线趋势跟随</a>
        <a href="./lunch/index.html">陈住气小饭堂</a>
        <a href="./jing/index.html">圣诞表白</a>
    </nav>
</body>
</html>
