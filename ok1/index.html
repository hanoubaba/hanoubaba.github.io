<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>插针止损策略</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="header-bar">
        <button id="btn-clear" type="button" class="header-action">清空</button>
        <h1 class="title"></h1>
        <div class="page-switch" role="tablist" aria-label="页面切换">
          <button id="btn-tab-front" type="button" class="page-switch__btn is-active" role="tab" aria-selected="true">前台</button>
          <button id="btn-tab-admin" type="button" class="page-switch__btn" role="tab" aria-selected="false">后台管理</button>
        </div>
      </div>
    </header>

    <section id="front-page">
    <section class="panel" aria-label="参数输入">
      <label class="field">
        <span class="field-label">价格</span>
        <input id="open-price-input" class="field-input" inputmode="decimal" autocomplete="off" />
      </label>

      <label class="field field--spaced">
        <span class="field-label">止损</span>
        <input id="stop-price-input" class="field-input" inputmode="decimal" autocomplete="off" />
      </label>

      <div class="field field--spaced" role="group" aria-labelledby="open-cost-label">
        <span id="open-cost-label" class="field-label">开仓成本</span>
        <div class="tabs" role="tablist" aria-label="开仓成本" data-tablist="open-cost">
          <button type="button" class="tab-btn is-active" role="tab" aria-selected="true" data-value="30">30</button>
          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="50">50</button>
          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="100">100</button>
        </div>
      </div>

      <div class="field field--spaced" role="group" aria-labelledby="time-dim-label">
        <span id="time-dim-label" class="field-label">时间维度</span>
        <div class="tabs" role="tablist" aria-label="时间维度" data-tablist="timeframe">
          <button id="tab-15m" class="tab-btn is-active" type="button" role="tab" aria-selected="true" data-value="15m">15分钟</button>
          <button id="tab-1h" class="tab-btn" type="button" role="tab" aria-selected="false" data-value="1h">1小时</button>
          <button id="tab-4h" class="tab-btn" type="button" role="tab" aria-selected="false" data-value="4h">4小时</button>
        </div>
        <span class="field-label" id="start-time-label">开始时间</span>
        <select id="start-time" class="field-input field-input--select" aria-labelledby="start-time-label" autocomplete="off">
          <option value="">请选择</option>
        </select>
        <button id="start-time-trigger" class="field-input field-input--select start-time-trigger" type="button" hidden aria-labelledby="start-time-label" aria-haspopup="dialog" aria-controls="start-time-picker">请选择</button>
      </div>

      <label class="field field--spaced">
        <span class="field-label">名称（选填）</span>
        <input id="name-input" class="field-input" autocomplete="off" />
      </label>

      <p id="error" class="error" role="alert" aria-live="polite"></p>
    </section>

    <section class="panel" aria-label="策略输出">
      <div class="field">
        <div class="field-heading">
          <span class="field-label">策略内容</span>
          <div class="copy-actions">
            <button id="btn-copy-qty" type="button" class="btn-copy-strategy" aria-label="复制数量">复制数量</button>
            <button id="btn-copy-strategy" type="button" class="btn-copy-strategy" aria-label="保存策略并复制指令">保存</button>
          </div>
        </div>
        <pre id="strategy-output" class="strategy-output" aria-live="polite"></pre>
      </div>
    </section>
    </section>

    <section id="admin-page" class="panel admin-page" aria-label="后台管理" hidden>
      <div id="admin-stats" class="admin-stats"></div>
      <div id="admin-list" class="admin-list"></div>
    </section>
  </main>

  <div id="start-time-picker" class="time-picker" hidden>
    <div class="time-picker__backdrop" data-dismiss="true"></div>
    <div class="time-picker__sheet" role="dialog" aria-modal="true" aria-labelledby="time-picker-title">
      <div class="time-picker__header">
        <h2 id="time-picker-title" class="time-picker__title">选择开始时间</h2>
      </div>
      <div id="time-picker-list" class="time-picker__list" role="listbox" aria-label="开始时间"></div>
      <div class="time-picker__actions">
        <button id="time-picker-cancel" type="button" class="time-picker__btn time-picker__btn--ghost">取消</button>
        <button id="time-picker-confirm" type="button" class="time-picker__btn time-picker__btn--primary">确定</button>
      </div>
    </div>
  </div>

  <div id="status-picker" class="status-picker" hidden>
    <div class="status-picker__backdrop" data-status-picker-dismiss="true"></div>
    <div class="status-picker__sheet" role="dialog" aria-modal="true" aria-labelledby="status-picker-title">
      <div class="status-picker__grabber" aria-hidden="true"></div>
      <div class="status-picker__header">
        <h2 id="status-picker-title" class="status-picker__title">提交状态</h2>
        <p id="status-picker-desc" class="status-picker__desc">选择后会同步更新后台统计数据。</p>
      </div>
      <div class="status-picker__options">
        <button id="status-picker-profit" type="button" class="status-picker__option status-picker__option--profit" data-status="profit">
          <span class="status-picker__option-title">盈利</span>
          <span class="status-picker__option-note">本单已开单并盈利</span>
        </button>
        <button id="status-picker-loss" type="button" class="status-picker__option status-picker__option--loss" data-status="loss">
          <span class="status-picker__option-title">亏损</span>
          <span class="status-picker__option-note">本单已开单并亏损</span>
        </button>
      </div>
      <p id="status-picker-error" class="status-picker__error" role="alert" aria-live="polite"></p>
      <button id="status-picker-cancel" type="button" class="status-picker__cancel">取消</button>
    </div>
  </div>

  <script src="./js/main.js"></script>
</body>
</html>
