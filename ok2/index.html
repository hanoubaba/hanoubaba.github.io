<!doctype html>

<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>固定止损策略</title>

  <link rel="stylesheet" href="./css/style.css" />

</head>

<body>
  <main class="container">

    <header class="header">

      <h1 class="title" id="title-clear" role="button" tabindex="0" aria-label="固定止损策略，点击清空价格输入">固定止损策略</h1>

    </header>



    <section class="panel" aria-label="参数输入">

      <label class="field">

        <span class="field-label">价格</span>

        <input id="open-price-input" class="field-input" inputmode="decimal" autocomplete="off" autofocus />

      </label>

      <div class="field field--spaced" role="group" aria-labelledby="direction-label">

        <span id="direction-label" class="field-label">方向</span>

        <div class="tabs" role="tablist" aria-label="方向" data-tablist="direction">

          <button type="button" class="tab-btn is-active" role="tab" aria-selected="true" data-value="long">做多</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="short">做空</button>

        </div>

      </div>



      <div class="field field--spaced" role="group" aria-labelledby="multiplier-label">

        <span id="multiplier-label" class="field-label">倍数</span>

        <div class="tabs" role="tablist" aria-label="倍数" data-tablist="multiplier">

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="10">10</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="20">20</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="30">30</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="50">50</button>

          <button type="button" class="tab-btn is-active" role="tab" aria-selected="true" data-value="100">100</button>

        </div>

      </div>



      <div class="field field--spaced" role="group" aria-labelledby="open-cost-label">

        <span id="open-cost-label" class="field-label">开仓成本</span>

        <div class="tabs" role="tablist" aria-label="开仓成本" data-tablist="open-cost" data-locked="true">

          <button type="button" class="tab-btn is-active" role="tab" aria-selected="true" aria-disabled="true" data-value="20">20</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" aria-disabled="true" data-value="30">30</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" aria-disabled="true" data-value="50">50</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" aria-disabled="true" data-value="100">100</button>

        </div>

      </div>

      <div class="field field--spaced" role="group" aria-labelledby="risk-multiple-label">

        <span id="risk-multiple-label" class="field-label">止盈止损倍数</span>

        <div class="tabs" role="tablist" aria-label="止盈止损倍数" data-tablist="risk-multiple">

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="0.618">0.618</button>

          <button type="button" class="tab-btn is-active" role="tab" aria-selected="true" data-value="1">1</button>

          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-value="2">2</button>

        </div>

      </div>

      <div class="field field--spaced" role="group" aria-labelledby="time-dim-label">

        <span id="time-dim-label" class="field-label">时间维度</span>

        <div class="tabs" role="tablist" aria-label="时间维度" data-tablist="timeframe">
          <button id="tab-15m" class="tab-btn" type="button" role="tab" aria-selected="false" data-value="15m">15分钟</button>
          <button id="tab-1h" class="tab-btn is-active" type="button" role="tab" aria-selected="true" data-value="1h">1小时</button>
        </div>

        <span class="field-label">开始时间</span>
        <select id="start-time" class="field-input field-input--select" autocomplete="off">
          <option value="">请选择</option>
        </select>

      </div>



      <p id="error" class="error" role="alert" aria-live="polite"></p>

    </section>



    <section class="panel" aria-label="策略输出">

      <div class="field">

        <div class="field-heading">

          <span class="field-label">策略输出</span>

          <div class="copy-actions">
            <button id="btn-copy-qty" type="button" class="btn-copy-strategy" aria-label="复制数量">复制数量</button>
            <button id="btn-copy-strategy" type="button" class="btn-copy-strategy" aria-label="一键复制全部策略输出">一键复制全部</button>
          </div>

        </div>

        <pre id="strategy-output" class="strategy-output" aria-live="polite"></pre>

      </div>

    </section>

  </main>

  <script src="./js/main.js"></script>

</body>

</html>
