<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7f0" />
  <title>午餐菜单</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app" aria-label="午餐菜单">
    <header class="topbar">
      <div class="topbar__copy">
        <p class="topbar__eyebrow">MINI MENU</p>
        <h1>午餐菜单</h1>
        <p class="topbar__desc">左侧点分类，右侧直接看菜名和图片。</p>
      </div>
      <div class="topbar__status">
        <span class="topbar__status-dot" aria-hidden="true"></span>
        营业中
      </div>
    </header>

    <section class="hero-strip" id="hero-strip" aria-label="推荐菜品"></section>

    <section class="menu-shell" aria-label="菜单列表">
      <aside class="category-rail" id="category-rail" aria-label="菜单分类"></aside>
      <section class="menu-panel">
        <div class="menu-scroll" id="menu-scroll"></div>
      </section>
    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
